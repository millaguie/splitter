# SPLITTER Go Configuration
# This file replaces legacy/func/settings.cfg
# Priority: CLI flags > SPLITTER_* env vars > this file > defaults

# =============================================================================
# INSTANCES
# =============================================================================
instances:
  # Number of Tor instances PER COUNTRY (CLI: -i, --instances)
  per_country: 2
  # Number of countries to select (CLI: -c, --countries)
  countries: 6
  # Maximum concurrent connections per Tor instance (HAProxy maxconn)
  max_concurrent_requests: 20
  # Number of retries for failed connections (HAProxy retries factor)
  retries: 1000

# =============================================================================
# PROXY - Master proxy (HAProxy) settings
# =============================================================================
proxy:
  master:
    # Primary listener address and port (what clients connect to)
    listen: "0.0.0.0"
    port: 63536
    # SOCKS proxy port (legacy/ root settings.cfg had separate ports)
    socks_port: 63536
    # HTTP proxy port
    http_port: 63537
    # Transparent proxy port
    transparent_port: 63538
    # Client-side timeout in seconds (derived: privoxy_timeout)
    client_timeout: 35
    # Server-side timeout in seconds (derived: privoxy_timeout)
    server_timeout: 35

  # HAProxy stats page
  stats:
    listen: "0.0.0.0"
    port: 63539
    uri: "/splitter_status"
    # Password is auto-generated at startup (replaces RAND_PASS)
    # password: <auto-generated>

  # Load balancing algorithm: "roundrobin" or "leastconn"
  # Automatically set based on relay_enforce mode:
  #   entry/exit -> roundrobin, speed -> leastconn
  load_balance_algorithm: "roundrobin"

  # HAProxy http-reuse mode: "never" (entry/exit) or "safe" (speed)
  haproxy_http_reuse: "never"

  # Security headers injection in HTTP responses
  # Set to false for penetration testing
  include_security_headers: true

  # Networks excluded from proxying (no_proxy)
  do_not_proxy:
    - "0.0.0.0"
    - "192.168.1.1"
    - "192.168.2.1"
    - "192.168.3.1"
    - "192.168.0.1"
    - "172.17.0.1"

# =============================================================================
# RELAY ENFORCEMENT (CLI: -re, --relay-enforce)
# =============================================================================
relay:
  # Mode: "entry" (default, best security), "exit" (GeoIP bypass), "speed" (fastest)
  enforce: "entry"

# =============================================================================
# TOR - Per-instance Tor configuration
# =============================================================================
tor:
  # Binary paths (auto-detected from $PATH if not set)
  binary_path: "/usr/bin/tor"
  # Listen address for Tor SOCKS/control ports
  listen_addr: "0.0.0.0"

  # Starting port numbers (incremented per instance)
  start_socks_port: 4999
  start_control_port: 5999
  start_http_port: 5199
  start_transport_port: 5099
  start_dns_port: 5299

  # Control port auth: "cookie" (recommended) or "password"
  # Bash version used password auth; Go will use cookie auth by default
  control_auth: "password"

  # Hidden service settings
  hidden_service:
    enabled: true
    base_path: "/tmp/splitter/hidden_service_"
    start_port: 3999
    max_streams: 0
    max_streams_close_circuit: false
    dir_group_readable: false
    num_introduction_points: 3

  # --- Tor Tuning Parameters ---
  # These map directly to torrc directives

  # Minimum timeout base (seconds) - used in derived timeout calculations
  minimum_timeout: 15

  # Circuit build timeout in seconds (Tor default: 60)
  circuit_build_timeout: 60

  # Learn circuit build timeout adaptively (0=off, 1=on)
  learn_circuit_build_timeout: 1

  # Seconds to keep unused circuits available (Tor default: 1800)
  circuits_available_timeout: 5

  # Stream timeout - detach and retry after this many seconds (Tor default: 0)
  circuit_stream_timeout: 20

  # Client-only mode - don't run as relay (0=no, 1=yes)
  client_only: 0

  # Connection padding: 0=off, 1=on, auto=negotiate
  connection_padding: 0

  # Reduced padding to save bandwidth (0=off, 1=on)
  reduced_connection_padding: 1

  # Exclude nodes with unknown GeoIP (0=off, 1=on, auto)
  geoip_exclude_unknown: 1

  # Strict node exclusion enforcement (0=soft, 1=strict)
  strict_nodes: 1

  # Firewall mode - only connect to allowed ports (0=off, 1=on)
  fascist_firewall: 0

  # Allowed ports when fascist_firewall is on
  firewall_ports:
    - 80
    - 443

  # Ports for long-lived connections (uses high-uptime nodes)
  long_lived_ports:
    - 1
    - 2

  # How often to consider building new circuit (seconds, Tor default: 30)
  new_circuit_period: 30

  # Max circuit age in seconds before renewal (Tor default: 600)
  # Go will randomize between 10 and this value per instance
  max_circuit_dirtiness: 15

  # Max pending circuits (Tor default: 32, max: 1024)
  max_client_circuits_pending: 1024

  # SOCKS handshake timeout in seconds (derived: circuit_stream_timeout + minimum_timeout)
  socks_timeout: 35

  # Seconds before exit-host association expires (Tor default: 1800)
  track_host_exits_expire: 10

  # Use entry guards for long-term entry selection (0=off, 1=on)
  use_entry_guards: 1

  # Number of entry guards to maintain
  num_entry_guards: 1

  # Reject unsafe SOCKS variants (DNS leak prevention)
  safe_socks: 1

  # Log SOCKS safety test results
  test_socks: 1

  # Block hostnames with illegal characters
  allow_non_rfc953_hostnames: 0

  # Reject connections to internal addresses
  client_reject_internal_addresses: 1

  # Download extra-info documents (bandwidth cost, usually off)
  download_extra_info: 0

  # Optimistic data sending (0=off, 1=on, auto)
  optimistic_data: "auto"

  # Automap hosts suffixes for .exit and .onion
  automap_hosts_suffixes: ".exit,.onion"

  # Comma-separated ports to warn about plaintext connections
  warn_plaintext_ports: "21,23,25,80,109,110,143"

  # Comma-separated ports to reject plaintext connections (empty = disabled)
  reject_plaintext_ports: ""

  # Sandbox (seccomp-bpf, Linux only) - disabled by default as it adds ~5% latency.
  # Enable with --sandbox or use the stealth profile.
  sandbox: false

  # Stream isolation via SOCKS5 auth (CLI: --stream-isolation)
  # When enabled, each destination gets its own circuit via SOCKS5 username/password
  # isolation using Tor's IsolateSOCKSAuth feature. Provides finer-grained separation
  # than the per-instance model.
  stream_isolation: false

  # IPv6 dual-stack support (CLI: --ipv6)
  # When enabled, Tor will use IPv6 relays alongside IPv4, increasing the
  # available relay pool and improving throughput in some regions.
  ipv6: false

  # --- Hardcoded torrc values (not exposed as config, listed for reference) ---
  # These are always set in generated torrc and should not need user tuning:
  #   RunAsDaemon 1, SafeLogging 1, CookieAuthentication 0,
  #   NoExec 1, DisableDebuggerAttachment 1, EnforceDistinctSubnets 1,
  #   ClientUseIPv4 1, ClientUseIPv6 (controlled by ipv6 setting), CircuitPriorityHalflife 1,
  #   ExtendByEd25519ID auto, KeepalivePeriod = minimum_timeout

# =============================================================================
# PRIVOXY - Legacy HTTP-to-SOCKS bridge (only used in legacy proxy mode)
# =============================================================================
privoxy:
  binary_path: "/usr/sbin/privoxy"
  listen: "0.0.0.0"
  start_port: 6999
  # Timeout in seconds (derived: circuit_stream_timeout + minimum_timeout)
  timeout: 35
  # Config file path prefix (instance number appended)
  config_file_prefix: "/tmp/splitter/privoxy_splitter_config_"

# =============================================================================
# HAPROXY
# =============================================================================
haproxy:
  binary_path: "/usr/sbin/haproxy"
  # Config file path
  config_file: "/tmp/splitter/splitter_master_proxy.cfg"

