  # Country rotation daemon settings
  rotation:
    enabled: true
    # Seconds between country changes
    interval: 120
    # Number of countries to rotate per cycle
    total_to_change: 10

  # Auto-update country list from Tor Metrics API (CLI: --auto-countries)
  auto_countries: false

# =============================================================================
# HEALTH CHECK
# =============================================================================
health_check:
  # Target URL for circuit health verification (must support HTTPS)
  url: "https://www.google.com/"
  # Check interval (seconds)
  interval: 12
  # Fail count before marking instance DOWN
  max_fail: 1
  # Success count before marking instance UP
  minimum_success: 1

# =============================================================================
# USER AGENT
# =============================================================================
user_agent:
  # Tor Browser User-Agent string for header spoofing
  # Should be updated at release time from Tor Browser's current UA
  # DO NOT fetch at runtime - privacy risk
  tor_browser: "Mozilla/5.0 (Windows NT 6.1; rv:52.0) Gecko/20100101 Firefox/52.0"

# =============================================================================
# LOGGING
# =============================================================================
logging:
  # Logs are OFF by default. Enable via --log flag or SPLITTER_LOG=1
  enabled: false
  # Log directory (defaults to temp_files path)
  dir: "/tmp/splitter"
  # Log filename prefix (instance number appended)
  name_prefix: "tor_log_"
  # Log level: DEBUG, INFO, WARN, ERROR (only when enabled)
  level: "INFO"
  # Format: "json" (auto in Docker) or "text" (auto in terminal)
  format: "text"

# =============================================================================
# PATHS
# =============================================================================
paths:
  # Temp directory for all generated files (deleted on startup if exists)
  temp_files: "/tmp/splitter"
  # Proxychains config file path
  proxychains_file: ""  # defaults to $HOME/.proxychains/proxychains.conf

# =============================================================================
# DNS (from legacy/ root settings.cfg - not used in func/ version)
# =============================================================================
dns:
  # dnsdist load balancer listen address
  dist_listen: "0.0.0.0"
  # dnsdist load balancer port
  dist_port: 5353
  # Tor DNS listen address
  tor_listen: "0.0.0.0"

# =============================================================================
# EXIT REPUTATION
# =============================================================================
exit_reputation:
  # Check exit node reputation before use via Onionoo API
  # Queries relay flags, uptime, and bandwidth to filter suspicious exits
  # (CLI: --exit-reputation, env: SPLITTER_EXIT_REPUTATION)
  enabled: false
